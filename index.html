<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Gym Management System - Login</title>
    <link rel="stylesheet" href="assets/css/style.css?v=3">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h1>Gym Management System</h1>
            <div class="login-tabs" role="tablist" aria-label="Login Type Selection">
                <button class="tab-btn active" data-tab="admin" role="tab" id="admin-tab" aria-selected="true" aria-controls="admin-login">Admin Login</button>
                <button class="tab-btn" data-tab="member" role="tab" id="member-tab" aria-selected="false" aria-controls="member-login">Member Login</button>
            </div>

            <!-- Admin Login Form -->
            <div id="admin-login" class="login-form active" role="tabpanel" aria-labelledby="admin-tab">
                <form id="adminForm" aria-label="Admin Login Form">
                    <div class="form-group">
                        <label for="adminUsername">Username</label>
                        <input 
                            type="text" 
                            id="adminUsername" 
                            name="username" 
                            autocomplete="username"
                            aria-required="true"
                            placeholder="Enter your username"
                            required>
                    </div>
                    <div class="form-group">
                        <label for="adminPassword">Password</label>
                        <input 
                            type="password" 
                            id="adminPassword" 
                            name="password" 
                            autocomplete="current-password"
                            aria-required="true"
                            placeholder="Enter your password"
                            required>
                    </div>
                    <button type="submit" class="btn btn-primary" aria-label="Login as Admin">Login</button>
                </form>
            </div>

            <!-- Member Login Form -->
            <div id="member-login" class="login-form" role="tabpanel" aria-labelledby="member-tab">
                <form id="memberForm" aria-label="Member Login Form">
                    <div class="form-group">
                        <label for="memberCode">Member Code (Ac_No)</label>
                        <input 
                            type="text" 
                            id="memberCode" 
                            name="member_code" 
                            autocomplete="off"
                            aria-required="true"
                            placeholder="Enter your member code"
                            required>
                    </div>
                    <button type="submit" class="btn btn-primary" aria-label="Login as Member">Login</button>
                </form>
            </div>
        </div>
    </div>

    <script src="assets/js/utils.js?v=3"></script>
    <script src="assets/js/auth.js?v=3"></script>
    <script>
        // Check authentication status on page load
        document.addEventListener('DOMContentLoaded', function() {
            checkAuthStatus();
        });

        // Tab switching
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const tab = this.dataset.tab;
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.login-form').forEach(f => f.classList.remove('active'));
                this.classList.add('active');
                document.getElementById(tab + '-login').classList.add('active');
            });
        });

        function checkAuthStatus() {
            fetch('api/auth.php?action=check')
                .then(res => res.json())
                .then(data => {
                    if (data.authenticated) {
                        if (data.role === 'admin') {
                            window.location.href = 'admin-dashboard.html';
                        } else if (data.role === 'member') {
                            if (data.gender === 'men') {
                                window.location.href = 'member-profile-men.html';
                            } else {
                                window.location.href = 'member-profile-women.html';
                            }
                        }
                    }
                })
                .catch(err => console.error('Auth check error:', err));
        }
    </script>
</body>
</html>
