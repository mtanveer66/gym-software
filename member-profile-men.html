<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Profile - Men</title>

    <link rel="stylesheet" href="assets/css/member-profile.css">
    <style>
        :root {
            --primary-color: #166534;
            --secondary-color: #14291c;
            --success-color: #0369a1;
            --error-color: #dc2626;
            --bg-color: #f3f7f4;
            --border-color: #bbf7d0;
            --shadow: 0 8px 24px rgba(20, 41, 28, 0.08);
            --shadow-lg: 0 16px 40px rgba(20, 41, 28, 0.14);
        }

        body {
            margin: 0;
            background: #f3f7f4;
            background-attachment: fixed;
            font-family: "Poppins", sans-serif;
            color: #14291c;
        }

        .loading,
        .error {
            text-align: center;
            color: #4b7a5e;
        }

        .error {
            color: var(--error-color);
            background: rgba(220, 38, 38, 0.08);
            border: 1px solid rgba(220, 38, 38, 0.22);
            border-radius: 10px;
            margin: 1rem;
        }

        .status-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.875rem;
            font-weight: 600;
        }

        .status-badge.status-active {
            background: rgba(3, 105, 161, 0.08);
            color: #0369a1;
            border: 1px solid #0369a1;
        }

        .status-badge.status-inactive {
            background: rgba(220, 38, 38, 0.08);
            color: #dc2626;
            border: 1px solid #dc2626;
        }

        .status-badge.status-completed {
            background: rgba(3, 105, 161, 0.08);
            color: #0369a1;
            border: 1px solid #0369a1;
        }

        .status-badge.status-pending {
            background: rgba(180, 83, 9, 0.08);
            color: #b45309;
            border: 1px solid #b45309;
        }
    </style>
    <style>
        .btn {
            background: var(--primary-color);
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            border: none;
        }

        .btn:hover {
            opacity: 0.9;
        }
    </style>
</head>

<body>

    <!-- Lookup -->
    <div class="lookup-bar">
        <div class="lookup-container">
            <input id="memberCodeInput" class="lookup-input" placeholder="Enter member code">
            <button id="lookupBtn" class="btn">Open Profile</button>
        </div>
    </div>

    <!-- Profile -->
    <div class="member-content">
        <div id="memberContent">
            <div class="loading">Search for a member to open the profile.</div>
        </div>
    </div>

    <script src="assets/js/utils.js?v=5"></script>
    <script src="assets/js/member-profile.js?v=5"></script>

    <script>
        window.MEMBER_GENDER = 'men';

        document.addEventListener("DOMContentLoaded", () => {
            fetch('api/auth.php?action=check')
                .then(r => r.json())
                .then(data => {
                    if (data.authenticated && data.role === 'member' && data.gender === 'men') {
                        loadMemberProfile(data.member_code);
                    }
                });
        });
    </script>

</body>

</html>
